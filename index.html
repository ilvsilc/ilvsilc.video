<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>生活輔導宣導單張｜學生生活輔導宣導影片｜宜蘭高商教官室</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "微軟正黑體", "Segoe UI", Arial, sans-serif;
    background: #f5f5f5;
    color: #2c3e2f;
  }
  .header {
    background: #d83434;
    color: white;
    padding: 14px 24px;
    font-size: 1.4rem;
    font-weight: bold;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .header small {
    font-size: 0.8rem;
    background: rgba(255,255,255,0.2);
    padding: 0.2rem 0.7rem;
    border-radius: 20px;
    margin-left: 12px;
  }
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px;
  }
  .section-title {
    font-size: 1.5rem;
    font-weight: bold;
    margin: 30px 0 15px;
    border-left: 6px solid #d83434;
    padding-left: 14px;
  }
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
  }
  .video-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s;
    cursor: pointer;
  }
  .video-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }
  .video-thumb {
    position: relative;
    background: #000;
    aspect-ratio: 16 / 9;
    overflow: hidden;
  }
  .video-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(216, 52, 52, 0.85);
    color: white;
    font-size: 32px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
  }
  .video-card:hover .play-btn {
    background: #d83434;
    transform: translate(-50%, -50%) scale(1.05);
  }
  .video-wrapper {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
  }
  .video-wrapper iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 0;
  }
  .video-title {
    padding: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    text-align: center;
    color: #333;
    background: white;
    border-top: 1px solid #f0f0f0;
  }
  .back2top {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #d83434;
    color: white;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    opacity: 0.8;
    z-index: 99;
  }
  .back2top:hover {
    opacity: 1;
    transform: translateY(-3px);
  }
  @media (max-width: 680px) {
    .container { padding: 12px 16px; }
    .section-title { font-size: 1.3rem; }
    .header { font-size: 1.1rem; padding: 12px 16px; }
    .play-btn { width: 48px; height: 48px; font-size: 24px; }
  }
</style>
</head>
<body>
<div class="header">
  📖 生活輔導宣導單張 - 學生生活輔導宣導影片
  <small>交通安全·反詐法治·健康生活</small>
</div>
<div class="container" id="content"></div>
<a href="#" class="back2top" id="back2topBtn">↑</a>

<script>
  // 影片資料庫（已將「宜商 危險的短暫自由」移至交通與安全分類）
  const videoData = {
    "🚸 交通與安全": [
      { id: "E0IhcDUO63g", title: "螢幕之外" },
      { id: "pHeZdX78pDg", title: "快一秒可能慢一輩子" },
      { id: "4hKh_dmYtVM", title: "低頭一秒生死一瞬 宜商" },
      { id: "fzKMcy3PMmM", title: "慢吞吞的斑馬線之旅" },
      { id: "aLKRxYdK0Tw", title: "宜商 危險的短暫自由" }   // 從健康/生活移至交通
    ],
    "⚖️ 反詐騙 / 法治": [
      { id: "510BssRNaXk", title: "是幫忙還是害自己" },
      { id: "J-NZVXvLy-0", title: "青春的代價" },
      { id: "cnWQWhI5Sfg", title: "114年宜蘭高商國家防災日" },
      { id: "vuubuBvmjfI", title: "拒絕兒少性剝削 不該點擊的連結" }
    ],
    "🩺 健康 / 生活": [
      { id: "CyaAepklmi8", title: "如果可以重來" },
      { id: "3FmHFxV0vzk", title: "一口變喪屍" },
      { id: "yrexDKU9QjA", title: "城市裡的一束光 宜商" },
      { id: "YkLkCuAVYUM", title: "幻彩仙果的陷阱" }
      // 已移除「宜商 危險的短暫自由」
    ]
  };

  const container = document.getElementById("content");

  // 直接使用 YouTube 官方保證存在的 hqdefault 縮圖（永不破圖）
  function getYouTubeThumbnail(videoId) {
    return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
  }

  function createVideoCard(video) {
    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "video-thumb";

    const img = document.createElement("img");
    img.src = getYouTubeThumbnail(video.id);
    img.alt = video.title;
    // 極少數情況 hqdefault 也失效（幾乎不可能），加上最終 fallback
    img.onerror = function() {
      this.src = "https://placehold.co/320x180/e0e0e0/666?text=No+Preview";
    };

    const playBtn = document.createElement("div");
    playBtn.className = "play-btn";
    playBtn.innerHTML = "▶";

    thumb.appendChild(img);
    thumb.appendChild(playBtn);

    const titleDiv = document.createElement("div");
    titleDiv.className = "video-title";
    titleDiv.innerText = video.title;

    card.appendChild(thumb);
    card.appendChild(titleDiv);

    let isPlaying = false;

    card.addEventListener("click", () => {
      if (isPlaying) return;
      if (thumb.querySelector("iframe")) return;

      const wrapper = document.createElement("div");
      wrapper.className = "video-wrapper";
      const iframe = document.createElement("iframe");
      iframe.src = `https://www.youtube.com/embed/${video.id}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
      iframe.setAttribute("allow", "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture");
      iframe.setAttribute("allowfullscreen", "true");

      wrapper.appendChild(iframe);
      while (thumb.firstChild) thumb.removeChild(thumb.firstChild);
      thumb.appendChild(wrapper);
      isPlaying = true;
      card.style.cursor = "default";
    });

    return card;
  }

  function render() {
    container.innerHTML = "";
    for (const [category, videos] of Object.entries(videoData)) {
      const section = document.createElement("div");
      const title = document.createElement("div");
      title.className = "section-title";
      title.innerText = category;

      const grid = document.createElement("div");
      grid.className = "video-grid";

      videos.forEach(video => {
        grid.appendChild(createVideoCard(video));
      });

      section.appendChild(title);
      section.appendChild(grid);
      container.appendChild(section);
    }
  }

  render();

  const backBtn = document.getElementById("back2topBtn");
  backBtn.addEventListener("click", (e) => {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
</script>
</body>
</html>
